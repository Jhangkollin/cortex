[project]
name = "cortex-brand-extract"
version = "0.1.0"
description = "Turn a brand URL into a structured BrandProfile."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27.0",
    "selectolax>=0.3.21",
    "pydantic>=2.7.0",
    "anthropic>=0.39.0",
]

[project.optional-dependencies]
render = ["playwright>=1.47.0"]
mcp = ["mcp>=1.2.0"]

[project.scripts]
cortex-brand-extract-mcp = "cortex_brand_extract.mcp.__main__:main"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.21.0",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex_brand_extract"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
mypy_path = "src"
explicit_package_bases = true

# mcp is an optional extra; suppress the missing-stub error for the third-party package.
[[tool.mypy.overrides]]
module = "mcp.*"
ignore_missing_imports = true

# When mcp is absent its types resolve to Any, making @mcp.tool() an untyped decorator.
# Relax only the optional-extra façade; all other modules keep strict = true.
[[tool.mypy.overrides]]
module = "cortex_brand_extract.mcp.*"
disallow_untyped_decorators = false
